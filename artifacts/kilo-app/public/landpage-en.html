<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kilo | Car Rental</title>
    <meta name="description" content="Rent your fleet with ease — Kilo car rental." />
    <link rel="alternate" hreflang="ar" href="/landpage.html" />
    <link rel="alternate" hreflang="en" href="/landpage-en.html" />
    <link rel="stylesheet" href="/fonts/inter.css" />
    <link rel="stylesheet" href="/landpage.css?v=van" />
  </head>
  <body>
    <div class="landing-root">
      <div class="bg-photo" aria-hidden="true"></div>
      <div class="bg-overlays" aria-hidden="true">
        <div class="bg-overlays__dim"></div>
        <div class="bg-overlays__pink"></div>
        <div class="bg-overlays__teal"></div>
        <div class="bg-overlays__fade"></div>
      </div>

      <main class="hero">
        <a href="/landpage-en.html" class="logo-wrap" aria-label="Kilo">
          <img src="/logo_kilo_white.webp" alt="Kilo" width="120" height="40" />
        </a>

        <a href="/landpage.html" class="lang-switch" title="التبديل إلى العربية" lang="ar">AR</a>

        <div class="hero-content">
          <h1 class="headline">
            <span class="headline-line-block headline-word headline-word--1">Rent your fleet</span>
            <span class="headline-line-block headline-word headline-word--2">with ease!</span>
          </h1>

          <p class="cta-wrap">
            <a
              class="cta-button"
              href="https://api.whatsapp.com/send?phone=966551171309&amp;text=Hello%2C%20I%20would%20like%20to%20request%20a%20rental%20from%20Kilo."
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="cta-button__label">Request rental now</span>
              <span class="cta-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7 17 17 7M7 7h10v10" />
                </svg>
              </span>
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
