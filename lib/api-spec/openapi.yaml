        - coolingType
        - registrationColor
        - chassisNumber
        - serialNumber
        - plateNumber
        - registrationExpiryDate
        - inspectionExpiryDate
        - odometer
        - periodicMaintenanceInterval
        - remainingPeriodicMaintenanceDays
        - status
        - createdAt
        - updatedAt

    CreateVehicleBody:
      type: object
      properties:
        brand:
          type: string
          minLength: 1
        modelYear:
          type: integer
          minimum: 2015
        coolingType:
          $ref: "#/components/schemas/VehicleCoolingType"
        registrationColor:
          type: string
          minLength: 1
        chassisNumber:
          type: string
          minLength: 1
        serialNumber:
          type: string
        plateNumber:
          type: string
          minLength: 1
        registrationExpiryDate:
          type: string
          format: date
        inspectionExpiryDate:
          type: string
          format: date
        odometer:
          type: integer
          minimum: 0
        periodicMaintenanceInterval:
          $ref: "#/components/schemas/VehiclePeriodicMaintenanceInterval"
        status:
          $ref: "#/components/schemas/VehicleStatus"
      required:
        - brand
        - modelYear
        - coolingType
        - registrationColor
        - chassisNumber
        - plateNumber
        - registrationExpiryDate
        - inspectionExpiryDate
        - odometer
        - periodicMaintenanceInterval
        - status

    UpdateVehicleBody:
      allOf:
        - $ref: "#/components/schemas/CreateVehicleBody"

    VehicleList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required: [data, total, page, pageSize]

    ContractStatus:
      type: string
      enum: [draft, active, overdue, cancelled, closed]

    ContractListStatusFilter:
      type: string
      enum: [draft, active, overdue, cancelled, closed, expiring_soon]
      description: مرشّح قائمة العقود؛ expiring_soon ليس حالة مخزّنة في قاعدة البيانات

    Contract:
      type: object
      properties:
        id:
          type: integer
        contractNumber:
          type: string
          description: "مثال: CT01-2026"
        customerId:
          type: integer
        customerName:
          type: string
        carId:
          type: integer
        vehicleBrand:
          type: string
        vehiclePlateNumber:
          type: string
        vehicleCoolingType:
          $ref: "#/components/schemas/VehicleCoolingType"
        templateId:
          type: integer
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ContractStatus"
        amountExVat:
          type: number
        taxRate:
          type: number
        taxAmount:
          type: number
        totalInclVat:
          type: number
        authorizationNumber:
          type: string
          description: رقم التفويض
        rentalDurationDays:
          type: integer
        remainingDays:
          type: integer
        overdueDays:
          type: integer
          description: أيام التأخير (محسوبة للمتأخر، أو محفوظة عند الإقفال)
        penaltyTotal:
          type: number
          description: مجموع غرامات التأخير شاملة الضريبة (محسوبة للمتأخر، أو محفوظة عند الإقفال)
        renderedContent:
          type: string
          nullable: true
        isSigned:
          type: boolean
          description: هل تم رفع العقد الموقع من العميل
        hasVehicleDamageForm:
          type: boolean
          description: هل يوجد نموذج أضرار مركبة محفوظ
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - contractNumber
        - customerId
        - customerName
        - carId
        - vehicleBrand
        - vehiclePlateNumber
        - vehicleCoolingType
        - templateId
        - startAt
        - endAt
        - status
        - amountExVat
        - taxRate
        - taxAmount
        - totalInclVat
        - authorizationNumber
        - rentalDurationDays
        - remainingDays
        - overdueDays
        - penaltyTotal
        - isSigned
        - hasVehicleDamageForm
        - createdAt
        - updatedAt

    VehicleDamageMarker:
      type: object
      properties:
        x:
          type: number
          minimum: 0
          maximum: 1
        y:
          type: number
          minimum: 0
          maximum: 1
      required: [x, y]

    VehicleDamageFormBody:
      type: object
      properties:
        markers:
          type: array
          items:
            $ref: "#/components/schemas/VehicleDamageMarker"
      required: [markers]

    VehicleDamageForm:
      type: object
      properties:
        contractId:
          type: integer
        contractNumber:
          type: string
        markers:
          type: array
          items:
            $ref: "#/components/schemas/VehicleDamageMarker"
        updatedAt:
          type: string
          format: date-time
      required: [contractId, contractNumber, markers, updatedAt]

    CreateContractBody:
      type: object
      properties:
        customerId:
          type: integer
          minimum: 1
        carId:
          type: integer
          minimum: 1
        templateId:
          type: integer
          minimum: 1
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        amountExVat:
          type: number
          minimum: 0.01
        authorizationNumber:
          type: string
          minLength: 1
          description: رقم التفويض
      required: [customerId, carId, templateId, startAt, endAt, amountExVat, authorizationNumber]

    UpdateContractBody:
      allOf:
        - $ref: "#/components/schemas/CreateContractBody"

    UpdateContractStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ContractStatus"
      required: [status]

    ContractList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Contract"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required: [data, total, page, pageSize]

    ContractTemplate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, body, createdAt, updatedAt]

    CreateContractTemplateBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
      required: [name, body]

    UpdateContractTemplateBody:
      allOf:
        - $ref: "#/components/schemas/CreateContractTemplateBody"

    ContractTemplateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContractTemplate"
      required: [data]

    InvoiceStatus:
      type: string
      enum: [draft, paid]
      description: >
        draft — مسودة (إيجار مرتبط بعقد مسودة، أو غرامة تأخير قبل التسجيل).
        paid — مدفوعة (إيجار بعد التنشيط، أو غرامة بعد التسجيل في المالية).

    UpdateInvoiceBody:
      type: object
      properties:
        totalInclVat:
          type: number
          minimum: 0.01
          description: المبلغ شامل الضريبة
      required: [totalInclVat]

    UpdateInvoiceStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [paid]
      required: [status]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
          description: "مثال: CT01-IN01-2026"
        invoiceSeq:
          type: integer
          description: "1 إيجار، 2 غرامة تأخير"
        contractId:
          type: integer
        customerName:
          type: string
        vehicleBrand:
          type: string
        vehiclePlateNumber:
          type: string
        invoiceType:
          $ref: "#/components/schemas/InvoiceType"
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        totalInclVat:
          type: number
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - invoiceNumber
        - invoiceSeq
        - contractId
        - customerName
        - vehicleBrand
        - vehiclePlateNumber
        - invoiceType
        - status
        - totalInclVat
        - createdAt
        - updatedAt

    InvoiceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required: [data, total, page, pageSize]

    InvoiceDetail:
      allOf:
        - $ref: "#/components/schemas/Invoice"
        - type: object
          properties:
            amountExVat:
              type: number
            taxRate:
              type: number
            taxAmount:
              type: number
            customerIdNumber:
              type: string
            customerMobile:
              type: string
            customerTaxNumber:
              type: string
              nullable: true
            customerEstablishmentName:
              type: string
              nullable: true
            vehicleModelYear:
              type: integer
            contractNumber:
              type: string
            contractStartAt:
              type: string
              format: date-time
            contractEndAt:
              type: string
              format: date-time
            sellerBusinessName:
              type: string
            sellerLogoUrl:
              type: string
              nullable: true
            sellerTaxNumber:
              type: string
              nullable: true
            sellerNationalAddress:
              $ref: "#/components/schemas/NationalAddress"
          required:
            - amountExVat
            - taxRate
            - taxAmount
            - customerIdNumber
            - customerMobile
            - vehicleModelYear
            - contractNumber
            - contractStartAt
            - contractEndAt
            - sellerBusinessName
            - sellerNationalAddress

    FinanceInvoiceStatus:
      type: string
      enum: [draft, paid]
      description: >
        draft — مسودة.
        paid — مدفوعة.

    BillingCycle:
      type: string
      enum: [monthly, yearly]

    UpdateFinanceInvoiceStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FinanceInvoiceStatus"
      required: [status]

    SalesSummary:
      type: object
      properties:
        count:
          type: integer
        amountExVat:
          type: number
        outputVat:
          type: number
        totalInclVat:
          type: number
      required: [count, amountExVat, outputVat, totalInclVat]

    ExpenseSummary:
      type: object
      properties:
        purchasesExVat:
          type: number
        purchasesInputVat:
          type: number
        subscriptionsExVat:
          type: number
        subscriptionsInputVat:
          type: number
        totalExpensesExVat:
          type: number
        totalExpensesInclVat:
          type: number
          description: إجمالي المصروفات شامل ضريبة القيمة المضافة
        purchasesInclVat:
          type: number
        subscriptionsInclVat:
          type: number
        totalInputVat:
          type: number
      required:
        - purchasesExVat
        - purchasesInputVat
        - subscriptionsExVat
        - subscriptionsInputVat
        - totalExpensesExVat
        - totalExpensesInclVat
        - purchasesInclVat
        - subscriptionsInclVat
        - totalInputVat

    FinancePeriodReport:
      type: object
      description: ملخص مالي لفترة واحدة (شهر أو سنة)
      properties:
        sales:
          $ref: "#/components/schemas/SalesSummary"
        expenses:
          $ref: "#/components/schemas/ExpenseSummary"
        outputVat:
          type: number
          description: ضريبة المخرجات على المبيعات المدفوعة في الفترة
        inputVat:
          type: number
          description: ضريبة المدخلات على المشتريات والاشتراكات المدفوعة في الفترة
        vatPayable:
          type: number
          description: صافي ضريبة القيمة المضافة (المخرجات − المدخلات)؛ القيمة السالبة تعني رصيداً دائناً
        netProfit:
          type: number
          description: صافي الربح (المبيعات شامل الضريبة − المصروفات شامل الضريبة − صافي ضريبة القيمة المضافة)
      required:
        - sales
        - expenses
