    VehicleCoolingType:
      type: string
      enum: [refrigerated, non_refrigerated]

    VehiclePeriodicMaintenanceInterval:
      type: string
      enum: [every_1_month, every_2_months, every_3_months]

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        brand:
          type: string
        modelYear:
          type: integer
          minimum: 2015
        coolingType:
          $ref: "#/components/schemas/VehicleCoolingType"
        registrationColor:
          type: string
        chassisNumber:
          type: string
        serialNumber:
          type: string
        plateNumber:
          type: string
        registrationExpiryDate:
          type: string
          format: date
        inspectionExpiryDate:
          type: string
          format: date
        odometer:
          type: integer
          minimum: 0
        periodicMaintenanceInterval:
          $ref: "#/components/schemas/VehiclePeriodicMaintenanceInterval"
        remainingPeriodicMaintenanceDays:
          type: integer
          minimum: 0
